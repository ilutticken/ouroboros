<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ouroboros: The System</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <!-- Top Ribbon for Score -->
    <div id="ui-layer" class="hidden" style="justify-content: space-between;">
        <div id="score-display">Data: <span id="score-value">0</span></div>
        <button id="btn-playtest" style="margin-right: 2rem; font-size: 0.6rem;">[DEV] +10 Data</button>
    </div>
    
    <div id="game-wrapper">
        <!-- Vendor shop overlay (2-Bit or Nibble — populated by ShopManager) -->
        <div id="shop-overlay" class="hidden">
            <h2 id="shop-title">Node Shop</h2>
            <div class="shop-items" id="shop-items"></div>
            <button id="btn-close-shop" style="margin-top: 1rem;">[ESC] Leave Shop</button>
        </div>
        
        <!-- The main canvas -->
        <canvas id="game-canvas"></canvas>
    </div>

    <!-- Bottom Ribbon for Terminal -->
    <div id="ui-layer-bottom" class="hidden">
        <div id="narrative-terminal"></div>
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
